name: Rebuild Helm Index

on:
  workflow_dispatch:

jobs:
  rebuild-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.12.1

      - name: Rebuild index
        run: |
          helm repo index .
          if git diff --quiet -- index.yaml; then
            echo "index.yaml is already up to date"
            exit 0
          fi
          git add index.yaml
          git commit -m "Update chart index"
          git push
